<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="TelaDeLogin.css">
    <title>Antilia - Login</title>
</head>
<body>

    <main class="main-login">

        <section class="left-login">
            <h1>Antilia</h1>
            <p>Venha fazer parte do nosso time</p>
            <img src="img/image-removebg-preview.png" class="left-img" alt="Bússola logo da Antilia">
        </section>

        <section class="right-login">

            <div class="card-login">
                <h2>Tela de Login</h2>

                <form id="login-form" class="form-login">
                    
                    <div class="text-field">  
                        <label for="txt-email">E-mail</label>
                        <input type="email" id="txt-email" name="email" placeholder="exemplo@gmail.com" required>
                    </div>

                    <div class="text-field">  
                        <label for="txt-senha">Senha</label>
                        <input type="password" id="txt-senha" name="senha" placeholder="Sua senha" required>
                    </div>
          
                    <div class="text-action">
                        <button type="submit" class="btn-login">Entrar</button>
                        <a href="EsqueceuConta.html" class="link-action">Esqueci a Senha</a>
                        
                        <span class="divider-text">Ainda não tem uma conta?</span>
                        <a href="CriarConta.html" class="btn-criar">Criar Conta</a>
                    </div>

                </form>
            </div>

        </section>

    </main>

    <script src="login.js"></script>
</body>
</html>
