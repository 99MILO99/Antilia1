<!DOCTYPE html>
<html lang="pb-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CriarConta.css">
    <title>Antilia</title>
</head>
<body>
    
    <main>
            <div class="Criar-Conta">

                <div class="Cabecalho">
                    <h1>Bem Vindo a Antilia</h1>
                    <p>Crier a Sua Conta para fazer parte da equipe</p>
                </div>

               <div class="dados-usuario">

                    <h1>Informe os seus Dados</h1>

                    <div class="text-field">
                        <label for="txt_login">Digite o seu Nome: </label>
                        <input type="Nome-usuario" id="txt_login" placeholder="Seu nome" required>
                        <hr>
                    </div>
                        
                    <div class="text-field">
                        <label for="txt_login">Digite o seu Gmail: </label>
                        <input type="Gmail" id="txt_login" placeholder="exemple@gmail.com" required>
                        <hr>
                    </div>

                    <div class="text-field">
                        <label for="txt_senha">Numero de Telefone: </label>
                        <input type="tel" id="txt_senha" placeholder="99 999999999" required>
                        <hr>
                    </div>
                    
                    <div class="text-field">
                        <label for="txt_senha">Crier a sua Senha: </label>
                        <input type="password" id="txt_senha" placeholder="Sua Senha" required>
                        <hr>
                    </div>
                        
                    <div class="text-field">
                        <label for="txt_senha">Repita a sua Senha: </label>
                        <input type="password" id="txt_senha" placeholder="Digite a Sua Senha" required>
                        <hr>
                    </div>
                        
                    <div class="text-action">
                        <button class="bnt-criar" onclick="window.location.href='login.html'" >Criar Conta</button>
                    </div>

               </div>
                    

            </div>
    </main>

    <script src="login.js"></script>

</body>
</html>
