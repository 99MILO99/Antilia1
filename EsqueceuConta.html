<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antilia</title>
</head>
<body>

    <div class="recupera-conta">
        
        <div class="Cabecalho">  
            <h1>Vamos recupera a sua senha, mas primeiro</h1>
        </div>

        <div class="recuperacao">
            <h1>Imforme os dados abaixo</h1>

            <div class="text-action">
                <label for="Gmail">Gmail:</label>
                <input type="Gmail" id="txt_login" placeholder="Seu Gmail" required>
                <hr>
            </div>

             <div class="text-action">
                <label for="Telefone">Telefone Cadastrado:</label>
                <input type="Gmail" id="txt_login" placeholder="99 999999999" required>
                <hr>
            </div>

            <div  class="Codigo">
                <button class="envia-codigo">Enviar Codigo</button>
                <hr>
            </div>

             <div class="text-action">
                <label for="Codigo">Codigo:</label>
                <input type="codigo" id="txt_login" placeholder="Codigo Enviado" required>
                <hr>
            </div>

        </div>

    </div>

</body>
</html>
